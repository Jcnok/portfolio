<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" font-family="Roboto, sans-serif">
  <defs>
    <!-- Filtros para efeitos de brilho (glowing effects) -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur1"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.8" result="color1"/>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1"/>

      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur2"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.4" result="color2"/>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2"/>

      <feMerge>
        <feMergeNode in="glow1"/>
        <feMergeNode in="glow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtextGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#a300e0" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="lineGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00f0ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradiente para o fundo (Dark Mode) -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0F1C"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>

    <!-- Padrão de malha/grid para o fundo (Cyberpunk) -->
    <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 L 0 20" fill="none" stroke="#2a2a40" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <rect width="80" height="80" fill="url(#smallGrid)"/>
      <path d="M 80 0 L 0 0 L 0 80" fill="none" stroke="#3a3a50" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Fundo com gradiente e grid -->
  <rect width="100%" height="100%" fill="url(#backgroundGradient)"/>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.15"/>

  <!-- Elementos Cyberpunk abstratos (linhas e pontos luminosos) -->
  <g stroke-width="1.5" stroke-linecap="round">
    <path d="M 0 80 Q 200 40 400 80 T 800 120" fill="none" stroke="#00f0ff" opacity="0.3" filter="url(#lineGlow)"/>
    <path d="M 0 200 Q 200 240 400 200 T 800 160" fill="none" stroke="#00f0ff" opacity="0.3" filter="url(#lineGlow)"/>
    <path d="M 0 100 Q 200 140 400 100 T 800 60" fill="none" stroke="#a300e0" opacity="0.3" filter="url(#lineGlow)"/>
    <path d="M 0 180 Q 200 140 400 180 T 800 220" fill="none" stroke="#a300e0" opacity="0.3" filter="url(#lineGlow)"/>
  </g>

  <g fill="#00f0ff" opacity="0.2" filter="url(#lineGlow)">
    <rect x="50" y="20" width="15" height="2"/>
    <rect x="735" y="258" width="15" height="2"/>
    <rect x="20" y="138" width="2" height="15"/>
    <rect x="778" y="138" width="2" height="15"/>
  </g>

  <!-- Título principal centralizado com muito destaque e efeito de brilho -->
  <text x="400" y="140" text-anchor="middle" font-size="48" fill="#ffffff" filter="url(#textGlow)" font-weight="bold">
    CRM Skynet Provider SQLite FastAPI
  </text>

  <!-- Subtítulo em menor escala com efeito de brilho -->
  <text x="400" y="190" text-anchor="middle" font-size="20" fill="#e0e0e0" filter="url(#subtextGlow)">
    FastAPI | SQLite | Docker | REST API | CRM System
  </text>

</svg>