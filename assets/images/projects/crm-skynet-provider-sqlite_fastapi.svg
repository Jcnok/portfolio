<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" font-family="Roboto, sans-serif">
  <defs>
    <!-- Background Gradient for Cyberpunk feel -->
    <radialGradient id="cyberpunkGradient" cx="50%" cy="50%" r="75%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#0A002A;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#1A004A;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2A005A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A002A;stop-opacity:1" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 L 0 20" fill="none" stroke="#4A00B0" stroke-width="0.5" opacity="0.4"/>
    </pattern>

    <!-- Glow Filter for text -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feFlood flood-color="#00F0FF" flood-opacity="0.8" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle background light effect -->
    <radialGradient id="lightSpot" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </radialGradient>

  </defs>

  <!-- Dark Background -->
  <rect x="0" y="0" width="800" height="280" fill="#0A002A" />

  <!-- Background Gradient Overlay -->
  <rect x="0" y="0" width="800" height="280" fill="url(#cyberpunkGradient)" />

  <!-- Grid Overlay -->
  <rect x="0" y="0" width="800" height="280" fill="url(#gridPattern)" />

  <!-- Central Light Spot Effect -->
  <rect x="0" y="0" width="800" height="280" fill="url(#lightSpot)" />

  <!-- Main Title -->
  <text x="400" y="110" text-anchor="middle" font-size="55px" font-weight="bold" fill="#00F0FF" filter="url(#textGlow)">
    CRM Skynet Provider SQLite FastAPI
  </text>

  <!-- Subtitle / Keywords -->
  <text x="400" y="165" text-anchor="middle" font-size="24px" fill="#E0E0E0" opacity="0.9">
    FastAPI | SQLite | RESTful API | Docker | CRM System
  </text>

</svg>