<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Import Google Font Roboto for better rendering in browsers -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
    </style>

    <!-- Background Gradient (Dark Mode: Deep Purple-Blue) -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f051a; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e; stop-opacity:1" />
    </linearGradient>

    <!-- Text Fill Gradient (Vibrant Blue/Purple Cyberpunk) -->
    <linearGradient id="textFillGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d0a0ff; stop-opacity:1" /> <!-- Lighter Purple -->
      <stop offset="50%" style="stop-color:#aaffff; stop-opacity:1" /> <!-- Lighter Cyan -->
      <stop offset="100%" style="stop-color:#d0a0ff; stop-opacity:1" />
    </linearGradient>

    <!-- Glowing Effect Filter (Cyan Glow) -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feFlood flood-color="#00ffff" flood-opacity="0.8" result="floodColor" />
      <feComposite in="floodColor" in2="blur" operator="in" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Grid Pattern for Background -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="25" y2="0" stroke="#330066" stroke-width="0.5" />
      <line x1="0" y1="0" x2="0" y2="25" stroke="#330066" stroke-width="0.5" />
    </pattern>

    <!-- Cyberpunk Lines Pattern (Subtle Overlay) -->
    <pattern id="cyberLinePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
        <line x1="0" y1="50" x2="100" y2="50" stroke="#00ffff" stroke-opacity="0.08" stroke-width="1"/>
        <line x1="50" y1="0" x2="50" y2="100" stroke="#8a2be2" stroke-opacity="0.08" stroke-width="1"/>
        <circle cx="50" cy="50" r="2" fill="#00ffff" opacity="0.08"/>
    </pattern>

  </defs>

  <!-- Background Rectangle with Gradient -->
  <rect x="0" y="0" width="800" height="280" fill="url(#backgroundGradient)" />

  <!-- Grid Overlay -->
  <rect x="0" y="0" width="800" height="280" fill="url(#grid)" opacity="0.6" />

  <!-- Cyberpunk Lines Overlay -->
  <rect x="0" y="0" width="800" height="280" fill="url(#cyberLinePattern)" opacity="0.3" />

  <!-- Main Title: "Stack Labs Churn" -->
  <text x="400" y="120" text-anchor="middle" font-family="Roboto, sans-serif" font-size="55px" font-weight="bold" fill="url(#textFillGradient)" filter="url(#glow)">
    Stack Labs Churn
  </text>

  <!-- Subtitle / Keywords -->
  <text x="400" y="185" text-anchor="middle" font-family="Roboto, sans-serif" font-size="22px" fill="#aaffff">
    Churn Prediction | Machine Learning | Scikit-learn | Predictive Modeling | Data Analysis
  </text>

  <!-- Additional subtle glowing elements for cyberpunk feel -->
  <circle cx="100" cy="50" r="5" fill="#00ffff" opacity="0.2" filter="url(#glow)"/>
  <circle cx="700" cy="230" r="5" fill="#8a2be2" opacity="0.2" filter="url(#glow)"/>
  <rect x="50" y="200" width="10" height="30" fill="#00ffff" opacity="0.15" transform="rotate(45 50 200)" filter="url(#glow)"/>
  <rect x="740" y="60" width="10" height="30" fill="#8a2be2" opacity="0.15" transform="rotate(-45 740 60)" filter="url(#glow)"/>

</svg>