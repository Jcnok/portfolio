<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradiente de fundo escuro para o tema Dark Mode -->
        <linearGradient id="darkBackground" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0d001a"/>
            <stop offset="100%" stop-color="#000000"/>
        </linearGradient>

        <!-- Gradiente radial cyberpunk vibrante (azul/roxo) -->
        <radialGradient id="cyberGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#00ffee" stop-opacity="0.7"/>
            <stop offset="30%" stop-color="#cc00ff" stop-opacity="0.5"/>
            <stop offset="70%" stop-color="#6600ff" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#0d001a" stop-opacity="0"/>
        </radialGradient>

        <!-- Padrão de malha/grid para o fundo -->
        <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a0050" stroke-width="0.5"/>
        </pattern>

        <!-- Filtro de brilho (glowing effect) para o texto principal -->
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
            <feOffset dx="0" dy="0" result="offsetBlur"/>
            <feFlood flood-color="#aaffff" flood-opacity="0.8" result="floodColor"/>
            <feComposite in="floodColor" in2="offsetBlur" operator="in" result="glowAlpha"/>
            <feMerge>
                <feMergeNode in="glowAlpha"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Retângulo de fundo com gradiente escuro -->
    <rect x="0" y="0" width="800" height="280" fill="url(#darkBackground)"/>

    <!-- Overlay com gradiente radial cyberpunk para adicionar profundidade -->
    <rect x="0" y="0" width="800" height="280" fill="url(#cyberGradient)"/>

    <!-- Overlay de malha/grid no fundo com opacidade reduzida -->
    <rect x="0" y="0" width="800" height="280" fill="url(#gridPattern)" opacity="0.3"/>

    <!-- Efeitos de brilho animados no fundo para realçar o tema cyberpunk -->
    <circle cx="400" cy="140" r="100" fill="#00ffee" opacity="0.1">
        <animate attributeName="r" from="100" to="110" dur="4s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" from="0.1" to="0.15" dur="4s" repeatCount="indefinite" additive="sum"/>
    </circle>
    <circle cx="400" cy="140" r="150" fill="#cc00ff" opacity="0.05">
        <animate attributeName="r" from="150" to="160" dur="5s" repeatCount="indefinite" additive="sum"/>
        <animate attributeName="opacity" from="0.05" to="0.08" dur="5s" repeatCount="indefinite" additive="sum"/>
    </circle>

    <!-- Título principal: "Stack Labs Churn" -->
    <text x="400" y="120" text-anchor="middle" font-family="Roboto, sans-serif" font-size="55px" fill="white" filter="url(#textGlow)">
        Stack Labs Churn
    </text>

    <!-- Subtítulo: "machine-learning" -->
    <text x="400" y="180" text-anchor="middle" font-family="Roboto, sans-serif" font-size="22px" fill="#b3ffff">
        machine-learning
    </text>
</svg>