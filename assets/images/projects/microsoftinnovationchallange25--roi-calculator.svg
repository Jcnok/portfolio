<svg width="800" height="280" viewBox="0 0 800 280" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dark Mode Background Gradient - Central Glow -->
        <radialGradient id="centralGlow" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
            <stop offset="0%" stop-color="#8A2BE2" stop-opacity="0.4"/> <!-- Vibrant Purple -->
            <stop offset="50%" stop-color="#4B0082" stop-opacity="0.2"/> <!-- Darker Purple -->
            <stop offset="100%" stop-color="#000022" stop-opacity="0"/> <!-- Transparent Dark Blue -->
        </radialGradient>

        <!-- Grid Pattern -->
        <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="20" y2="0" stroke="#00FFFF" stroke-width="0.3" stroke-opacity="0.12"/>
            <line x1="0" y1="0" x2="0" y2="20" stroke="#00FFFF" stroke-width="0.3" stroke-opacity="0.12"/>
        </pattern>

        <!-- Glowing Effect Filter for Title (Purple Glow) -->
        <filter id="glowTitle" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"></feGaussianBlur>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Glowing Effect Filter for Sub-text (Blue Glow) -->
        <filter id="glowSubtext" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"></feGaussianBlur>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Solid Dark Background -->
    <rect x="0" y="0" width="800" height="280" fill="#000022"/>

    <!-- Radial Gradient Overlay for Central Glow -->
    <rect x="0" y="0" width="800" height="280" fill="url(#centralGlow)"/>

    <!-- Grid Pattern Overlay -->
    <rect x="0" y="0" width="800" height="280" fill="url(#gridPattern)"/>

    <!-- Subtle Cyberpunk Lines -->
    <line x1="0" y1="130" x2="800" y2="130" stroke="#00FFFF" stroke-width="0.7" stroke-opacity="0.08"/>
    <line x1="0" y1="135" x2="800" y2="135" stroke="#8A2BE2" stroke-width="0.7" stroke-opacity="0.08"/>
    <line x1="0" y1="180" x2="800" y2="180" stroke="#00FFFF" stroke-width="0.5" stroke-opacity="0.05"/>

    <!-- Main Title with Glowing Effect -->
    <!-- Glow Layer (Purple) -->
    <text x="400" y="110" font-family="Roboto, sans-serif" font-size="52px" font-weight="bold" fill="#8A2BE2" text-anchor="middle" style="filter:url(#glowTitle);">MicrosoftInnovationChallange25 ROI Calculator</text>
    <!-- Sharp Text Layer (Light Cyan) -->
    <text x="400" y="110" font-family="Roboto, sans-serif" font-size="52px" font-weight="bold" fill="#E0FFFF" text-anchor="middle">MicrosoftInnovationChallange25 ROI Calculator</text>

    <!-- Sub-texts with Glowing Effect -->
    <!-- Glow Layer (Cyan) -->
    <text x="400" y="160" font-family="Roboto, sans-serif" font-size="22px" fill="#00FFFF" text-anchor="middle" style="filter:url(#glowSubtext);">Azure OpenAI | Streamlit | LLM | ROI Analysis | Docker</text>
    <!-- Sharp Text Layer (Light Blue) -->
    <text x="400" y="160" font-family="Roboto, sans-serif" font-size="22px" fill="#ADD8E6" text-anchor="middle">Azure OpenAI | Streamlit | LLM | ROI Analysis | Docker</text>

</svg>