name: Update Projects (Pinned Repos → projects.json)

on:
  schedule:
    # Roda diariamente às 06:00 UTC (03:00 BRT)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Permite disparar manualmente (ao pinar/despinar repos)
  push:
    branches:
      - main
    paths:
      - 'scripts/generate-projects.mjs'
      - 'scripts/generate-skills.mjs'
      - '.github/workflows/update-projects.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-projects:
    name: Generate projects.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate projects.json 🤖
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-projects.mjs

      - name: Generate languages.json 📊
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-skills.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet assets/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push 🚀
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "chore(auto): daily update of projects and data-driven skills

          Generated by GitHub Actions pipeline.
          Trigger: ${{ github.event_name }}"
          git push
